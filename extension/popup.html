<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    width: 320px; background: #000; color: #fff;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border-bottom: 1px solid #222;
  }
  .logo svg { width: 20px; height: 20px; display: block; }
  .brand { font-weight: 800; font-size: 14px; color: #e50914; letter-spacing: -0.3px; flex: 1; }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a;
    font-size: 11px; color: #888;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    background: #333; border: 1px solid #444;
  }
  .status-dot.connected { background: #22c55e; border-color: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .status-dot.error { background: #ef4444; border-color: #ef4444; }
  .status-text { flex: 1; }
  .status-room {
    background: rgba(229,9,20,0.1); border: 1px solid rgba(229,9,20,0.2);
    color: #ff6b6b; font-family: ui-monospace, monospace;
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
  }

  /* Form */
  .body { padding: 14px 16px; }
  .field { margin-bottom: 12px; }
  .field-label {
    font-size: 9px; color: #666; text-transform: uppercase;
    letter-spacing: 0.8px; font-weight: 600; margin-bottom: 5px;
  }
  .field-input {
    width: 100%; padding: 9px 10px;
    background: #141414; border: 1px solid #333; color: #fff;
    border-radius: 6px; font-size: 12px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .field-input:focus { outline: none; border-color: #e50914; }
  .field-input::placeholder { color: #555; }
  .field-input:disabled { opacity: 0.5; }
  .auto-hint {
    display: none; align-items: center; gap: 4px;
    font-size: 9px; color: #4a4; margin-top: 3px;
  }
  .auto-hint svg { width: 9px; height: 9px; }

  /* Buttons */
  .btn {
    width: 100%; padding: 10px; border: 0; border-radius: 6px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-connect { background: #e50914; color: #fff; }
  .btn-connect:hover { background: #ff1a25; }
  .btn-connect:active { transform: scale(0.98); }
  .btn-disconnect { background: #1a1a1a; color: #888; border: 1px solid #333; font-size: 11px; padding: 7px; }
  .btn-disconnect:hover { background: #222; color: #fff; }

  /* Movies list (shown when connected) */
  .movies-section { border-top: 1px solid #1a1a1a; }
  .movies-header {
    padding: 10px 16px 8px; font-size: 9px; color: #666;
    text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .movies-header .count { color: #444; font-weight: 400; }
  .movies-list {
    max-height: 300px; overflow-y: auto;
    padding: 0 8px 8px;
  }
  .movies-list::-webkit-scrollbar { width: 5px; }
  .movies-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .movie-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 6px; cursor: pointer;
    transition: background 0.12s;
  }
  .movie-item:hover { background: #1a1a1a; }
  .movie-poster {
    width: 36px; height: 52px; border-radius: 3px; object-fit: cover;
    background: #1a1a1a; flex-shrink: 0;
  }
  .movie-info { flex: 1; min-width: 0; }
  .movie-title {
    font-size: 12px; font-weight: 600; color: #eee;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .movie-meta { font-size: 10px; color: #555; margin-top: 1px; }
  .movie-go {
    background: #e50914; color: #fff; border: 0; border-radius: 5px;
    padding: 5px 10px; font-size: 10px; font-weight: 700; cursor: pointer;
    flex-shrink: 0; opacity: 0; transition: opacity 0.12s;
  }
  .movie-item:hover .movie-go { opacity: 1; }
  .movie-go:hover { background: #ff1a25; }

  .movies-empty {
    text-align: center; padding: 24px 16px; color: #444; font-size: 11px;
  }
  .movies-loading { text-align: center; padding: 20px; color: #666; font-size: 11px; }

  /* Disconnect row */
  .disconnect-row { padding: 8px 16px 12px; }

  /* How it works */
  .how { padding: 12px 16px; border-top: 1px solid #1a1a1a; background: #060606; }
  .how-title { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 8px; }
  .step { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 6px; font-size: 10px; color: #666; line-height: 1.4; }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    width: 16px; height: 16px; border-radius: 50%;
    background: #1a1a1a; border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #e50914;
    flex-shrink: 0; margin-top: 1px;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 48 46" overflow="visible">
        <path d="M13 24 L16 43 L32 43 L35 24 Z" fill="#e50914"/>
        <circle cx="19" cy="27" r="4.5" fill="#F5E6C8"/><circle cx="29" cy="27" r="4.5" fill="#F0DDB8"/>
        <circle cx="24" cy="26" r="4.8" fill="#F5E6C8"/><circle cx="16" cy="22" r="5" fill="#FFF3D6"/>
        <circle cx="32" cy="22" r="5" fill="#FFF8E7"/><circle cx="24" cy="21" r="5.5" fill="#FFFDF5"/>
        <circle cx="20" cy="16" r="4.5" fill="#FFF8E7"/><circle cx="28" cy="15.5" r="4.5" fill="#FFFBE0"/>
        <circle cx="24" cy="11" r="3.8" fill="#FFFDF5"/>
      </svg>
    </div>
    <span class="brand">watchparty</span>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Not connected</span>
  </div>

  <!-- Not connected: form -->
  <div id="formSection" class="body">
    <div class="field">
      <div class="field-label">Server</div>
      <input class="field-input" id="server" placeholder="https://your-app.up.railway.app">
      <div class="auto-hint" id="autoHint">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        Auto-detected
      </div>
    </div>
    <div class="field">
      <div class="field-label">Room code</div>
      <input class="field-input" id="room" placeholder="paste room code">
    </div>
    <button class="btn btn-connect" id="connectBtn">Connect</button>
  </div>

  <!-- Connected: auto-crawled movies -->
  <div id="connectedSection" style="display:none">
    <div class="movies-section">
      <div class="movies-header">
        <span id="moviesLabel">Movies on this page</span>
        <span class="count" id="moviesCount"></span>
      </div>
      <div class="movies-list" id="moviesList">
        <div class="movies-loading">Scanning page...</div>
      </div>
    </div>
    <div class="disconnect-row">
      <button class="btn btn-disconnect" id="disconnectBtn">Disconnect</button>
    </div>
  </div>

  <!-- How it works (only when not connected) -->
  <div class="how" id="howSection">
    <div class="how-title">How it works</div>
    <div class="step"><div class="step-num">1</div><span>Open a streaming site and connect to your room</span></div>
    <div class="step"><div class="step-num">2</div><span>Movies on the page appear here automatically</span></div>
    <div class="step"><div class="step-num">3</div><span>Click <b style="color:#ccc">Watch</b> to send it to your room</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
