<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    width: 300px; background: #000; color: #fff;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px 12px; border-bottom: 1px solid #222;
  }
  .logo svg { width: 22px; height: 22px; display: block; }
  .brand { font-weight: 800; font-size: 15px; color: #e50914; letter-spacing: -0.3px; }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: #0c0c0c; border-bottom: 1px solid #1a1a1a;
    font-size: 12px; color: #888;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: #333; border: 1px solid #444;
  }
  .status-dot.connected { background: #22c55e; border-color: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .status-dot.error { background: #ef4444; border-color: #ef4444; }
  .status-text { flex: 1; }
  .status-room {
    background: rgba(229,9,20,0.1); border: 1px solid rgba(229,9,20,0.2);
    color: #ff6b6b; font-family: ui-monospace, monospace;
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
  }

  /* Body */
  .body { padding: 16px; }

  /* Form fields */
  .field { margin-bottom: 14px; }
  .field-label {
    font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: 0.8px; font-weight: 600; margin-bottom: 6px;
  }
  .field-input {
    width: 100%; padding: 10px 12px;
    background: #141414; border: 1px solid #333; color: #fff;
    border-radius: 6px; font-size: 13px; font-family: inherit;
    transition: border-color 0.15s;
  }
  .field-input:focus { outline: none; border-color: #e50914; }
  .field-input::placeholder { color: #555; }
  .field-input:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Auto-detect hint */
  .auto-hint {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: #4a4; margin-top: 4px;
  }
  .auto-hint svg { width: 10px; height: 10px; flex-shrink: 0; }

  /* Buttons */
  .btn {
    width: 100%; padding: 11px; border: 0; border-radius: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-connect {
    background: #e50914; color: #fff;
  }
  .btn-connect:hover { background: #ff1a25; }
  .btn-connect:active { transform: scale(0.98); }
  .btn-disconnect {
    background: #1a1a1a; color: #999; border: 1px solid #333;
  }
  .btn-disconnect:hover { background: #222; color: #fff; border-color: #444; }

  /* How it works section */
  .how {
    padding: 14px 16px; border-top: 1px solid #1a1a1a;
    background: #0a0a0a;
  }
  .how-title {
    font-size: 10px; color: #555; text-transform: uppercase;
    letter-spacing: 0.8px; font-weight: 600; margin-bottom: 10px;
  }
  .step {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 8px; font-size: 11px; color: #888; line-height: 1.4;
  }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: #1a1a1a; border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #e50914;
    flex-shrink: 0; margin-top: 1px;
  }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 48 46" overflow="visible">
        <path d="M13 24 L16 43 L32 43 L35 24 Z" fill="#e50914"/>
        <path d="M19.5 24 L21.5 43" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
        <path d="M28.5 24 L26.5 43" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
        <circle cx="19" cy="27" r="4.5" fill="#F5E6C8"/>
        <circle cx="29" cy="27" r="4.5" fill="#F0DDB8"/>
        <circle cx="24" cy="26" r="4.8" fill="#F5E6C8"/>
        <circle cx="16" cy="22" r="5" fill="#FFF3D6"/>
        <circle cx="32" cy="22" r="5" fill="#FFF8E7"/>
        <circle cx="24" cy="21" r="5.5" fill="#FFFDF5"/>
        <circle cx="14" cy="17" r="4" fill="#FFFBE0"/>
        <circle cx="20" cy="16" r="4.5" fill="#FFF8E7"/>
        <circle cx="28" cy="15.5" r="4.5" fill="#FFFBE0"/>
        <circle cx="34" cy="17.5" r="4" fill="#FFF3D6"/>
        <circle cx="24" cy="11" r="3.8" fill="#FFFDF5"/>
        <circle cx="18" cy="12" r="3.2" fill="#FFF8E7"/>
        <circle cx="30" cy="11.5" r="3" fill="#FFFBE0"/>
      </svg>
    </div>
    <span class="brand">watchparty</span>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Not connected</span>
  </div>

  <!-- Form -->
  <div class="body">
    <div class="field">
      <div class="field-label">Server</div>
      <input class="field-input" id="server" placeholder="https://your-app.up.railway.app">
      <div class="auto-hint" id="autoHint" style="display:none">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
        Auto-detected from current tab
      </div>
    </div>
    <div class="field">
      <div class="field-label">Room code</div>
      <input class="field-input" id="room" placeholder="paste room code">
    </div>
    <button class="btn btn-connect" id="connectBtn">Connect</button>
    <button class="btn btn-disconnect" id="disconnectBtn" style="display:none">Disconnect</button>
  </div>

  <!-- How it works -->
  <div class="how" id="howSection">
    <div class="how-title">How it works</div>
    <div class="step"><div class="step-num">1</div><span>Open your watchparty room and select <b style="color:#ccc">Extension</b> mode</span></div>
    <div class="step"><div class="step-num">2</div><span>Click <b style="color:#ccc">Connect</b> above with your room code</span></div>
    <div class="step"><div class="step-num">3</div><span>Open a streaming site in another tab — playback syncs automatically</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
