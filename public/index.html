<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>watchparty</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="landing">
  <div class="card">
    <h1>watchparty</h1>
    <p class="sub">Watch YouTube, movies, and any site together — in sync.</p>

    <label>Your name
      <input id="name" placeholder="alex" maxlength="24" autocomplete="off">
    </label>

    <button id="create">Create a room</button>

    <div class="divider">or join an existing room</div>

    <label>Room code
      <input id="code" placeholder="abc12345" autocomplete="off">
    </label>
    <button id="join" class="secondary">Join</button>
  </div>
  <script src="/js/landing.js"></script>
</body>
</html>
